<div class="dashboard">
  <mat-card appearance="outlined">
    <mat-card-content>
      <div class="title">Total</div>
      <div class="value">{{total()}}</div>
    </mat-card-content>
  </mat-card>

  <mat-card appearance="filled">
    <mat-card-content>
      <div class="title">Favorite</div>
      <div class="value">{{favorite()}}</div>
    </mat-card-content>
  </mat-card>

  <mat-card appearance="outlined">
    <mat-card-content>
      <div class="title">Frontend</div>
      <div class="value">{{ frontend() }}</div>
    </mat-card-content>
  </mat-card>

  <mat-card appearance="outlined">
    <mat-card-content>
      <div class="title">Backend</div>
      <div class="value">{{ backend() }}</div>
    </mat-card-content>
  </mat-card>

  <mat-card appearance="outlined">
    <mat-card-content>
      <div class="title">Full-Stack</div>
      <div class="value">{{ fullstack() }}</div>
    </mat-card-content>
  </mat-card>
</div>
