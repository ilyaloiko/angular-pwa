<mat-card appearance="outlined">
  <mat-card-content>
    <div class="container-column">

      <div class="container-row">
        <button matButton="elevated"
                routerLink="/add-candidate">
          Add
        </button>

        <mat-form-field appearance="outline" style="flex: 1" subscriptSizing="dynamic">
          <mat-label>Search</mat-label>
          <input matInput (input)="search($event)" placeholder="Ex. Senior Frontend Angular">
        </mat-form-field>
      </div>

      <table mat-table [dataSource]="candidates()">
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Name</th>
          <td mat-cell *matCellDef="let element">
            {{ element.firstName }} {{ element.lastName }}
          </td>
        </ng-container>

        <ng-container matColumnDef="position">
          <th mat-header-cell *matHeaderCellDef>Position</th>
          <td mat-cell *matCellDef="let element">{{ element.position }}</td>
        </ng-container>

        <ng-container matColumnDef="level">
          <th mat-header-cell *matHeaderCellDef>Level</th>
          <td mat-cell *matCellDef="let element">{{ element.level }}</td>
        </ng-container>

        <ng-container matColumnDef="email">
          <th mat-header-cell *matHeaderCellDef>Email</th>
          <td mat-cell *matCellDef="let element">{{ element.email }}</td>
        </ng-container>

        <ng-container matColumnDef="skills">
          <th mat-header-cell *matHeaderCellDef>Skills</th>
          <td mat-cell *matCellDef="let element" [matTooltip]="element.skills.join(', ')">
            {{ element.skills | truncateArray: 3 }}
          </td>
        </ng-container>

        <ng-container matColumnDef="favorite">
          <th mat-header-cell *matHeaderCellDef>Favorite</th>
          <td mat-cell *matCellDef="let element">
            @if (element.favorite) {
              <mat-icon style="color: hotpink">favorite</mat-icon>
            }
          </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let element">
            <button matIconButton
                    [matMenuTriggerFor]="menu">
              <mat-icon>more_vert</mat-icon>
            </button>
            <mat-menu #menu="matMenu">
              <button mat-menu-item (click)="delete(element)">Delete</button>
            </mat-menu>
          </td>
        </ng-container>

        <tr class="mat-row" *matNoDataRow>
          <td class="mat-cell" colspan="7">No data</td>
        </tr>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
    </div>
  </mat-card-content>
</mat-card>
